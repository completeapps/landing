<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complete – a collection of small, useful websites</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Admin controls (same pattern as wishlist) -->
  <div class="admin-controls">
    <button id="adminToggle" class="admin-btn">Admin</button>
  </div>

  <div class="page">
    <header class="site-header">
      <img src="complete.png" alt="Complete logo" class="brand-logo-img">

      <button class="mode-toggle" id="modeToggle" aria-label="Toggle light or dark mode">
        <span class="mode-icon" id="modeIcon">●</span>
      </button>

      <h1 class="brand-name">COMPLETE</h1>
      <p class="tagline">a collection for small, useful websites.</p>
    </header>

    <main class="websites-section">
      <div class="section-header">
        <h2>Websites</h2>
        <button id="addWebsiteButton" class="add-btn admin-only" style="display:none;">+ Add Website</button>
      </div>

      <div class="websites-grid" id="websitesGrid">
        <!-- Website cards rendered from Firebase -->
      </div>
    </main>
  </div>

  <footer class="footer">
    <a href="https://www.perplexity.ai" class="footer-link" target="_blank" rel="noopener noreferrer">
      <img src="perplexity.png" alt="Perplexity logo" class="perplexity-logo">
      <span class="footer-text"><strong>PERPLEXITY</strong> BUILT WITH</span>
    </a>
  </footer>

  <!-- Admin Login Modal -->
  <div class="modal" id="adminLoginModal">
    <div class="modal-content">
      <div class="info-header">
        <h3>Admin Login</h3>
        <button class="modal-close" id="adminLoginClose">×</button>
      </div>
      <input type="password" id="adminPassword" placeholder="Enter password" class="form-input">
      <div class="form-buttons">
        <button id="adminLoginConfirm" class="save-btn">Login</button>
        <button id="adminLoginCancel" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add Website Modal -->
  <div class="modal" id="addWebsiteModal">
    <div class="modal-content">
      <div class="info-header">
        <h3>Add Website</h3>
        <button class="modal-close" id="addWebsiteClose">×</button>
      </div>

      <input type="text" id="websiteName" class="form-input" placeholder="Website name (e.g., Complete Planner)">
      <textarea id="websiteDescription" class="form-textarea" placeholder="Short description"></textarea>
      <input type="url" id="websiteLink" class="form-input" placeholder="Website link (https://...)">
      <input type="text" id="websiteImage" class="form-input" placeholder="Image filename (e.g., planner.png)">

      <label class="checkbox-row">
        <input type="checkbox" id="websiteWip">
        Work in progress
      </label>

      <div class="form-buttons">
        <button id="saveWebsite" class="save-btn">Save Website</button>
        <button id="cancelWebsite" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Edit Website Modal -->
  <div class="modal" id="editWebsiteModal">
    <div class="modal-content">
      <div class="info-header">
        <h3>Edit Website</h3>
        <button class="modal-close" id="editWebsiteClose">×</button>
      </div>

      <input type="text" id="editWebsiteName" class="form-input" placeholder="Website name">
      <textarea id="editWebsiteDescription" class="form-textarea" placeholder="Short description"></textarea>
      <input type="url" id="editWebsiteLink" class="form-input" placeholder="Website link (https://...)">
      <input type="text" id="editWebsiteImage" class="form-input" placeholder="Image filename (e.g., planner.png)">

      <label class="checkbox-row">
        <input type="checkbox" id="editWebsiteWip">
        Work in progress
      </label>

      <div class="form-buttons">
        <button id="updateWebsite" class="save-btn">Update</button>
        <button id="cancelEditWebsite" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Dark / light mode toggle logic -->
  <script type="module">
    window.addEventListener('DOMContentLoaded', () => {
      const body = document.body;
      const modeToggle = document.getElementById('modeToggle');
      const modeIcon = document.getElementById('modeIcon');

      const savedMode = localStorage.getItem('complete-theme');
      if (savedMode === 'light') {
        body.classList.add('light');
        modeIcon.textContent = '○'; // light
      } else {
        body.classList.remove('light');
        modeIcon.textContent = '●'; // dark
      }

      modeToggle.addEventListener('click', () => {
        const isLight = body.classList.toggle('light');
        localStorage.setItem('complete-theme', isLight ? 'light' : 'dark');
        modeIcon.textContent = isLight ? '○' : '●';
      });
    });
  </script>

  <!-- Firebase + websites logic -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import {
      getDatabase,
      ref,
      onValue,
      push,
      set,
      update,
      remove
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

    // Firebase config for landing project
    const firebaseConfig = {
      apiKey: "AIzaSyBP0QSuhQ2OrWmvzCKIGF-6rd7d62HMYD8",
      authDomain: "landing-87909.firebaseapp.com",
      databaseURL: "https://landing-87909-default-rtdb.firebaseio.com",
      projectId: "landing-87909",
      storageBucket: "landing-87909.firebasestorage.app",
      messagingSenderId: "951882714575",
      appId: "1:951882714575:web:c0cbe989b0d3a6601356ba",
      measurementId: "G-RWPLFXLBCH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ADMIN_PASSWORD = '0000'; // change this

    const adminToggle = document.getElementById('adminToggle');
    const addWebsiteButton = document.getElementById('addWebsiteButton');
    const websitesGrid = document.getElementById('websitesGrid');

    const adminLoginModal = document.getElementById('adminLoginModal');
    const adminLoginClose = document.getElementById('adminLoginClose');
    const adminLoginCancel = document.getElementById('adminLoginCancel');
    const adminLoginConfirm = document.getElementById('adminLoginConfirm');
    const adminPasswordInput = document.getElementById('adminPassword');

    const addWebsiteModal = document.getElementById('addWebsiteModal');
    const addWebsiteClose = document.getElementById('addWebsiteClose');
    const cancelWebsite = document.getElementById('cancelWebsite');
    const saveWebsite = document.getElementById('saveWebsite');

    const websiteNameInput = document.getElementById('websiteName');
    const websiteDescriptionInput = document.getElementById('websiteDescription');
    const websiteLinkInput = document.getElementById('websiteLink');
    const websiteImageInput = document.getElementById('websiteImage');
    const websiteWipInput = document.getElementById('websiteWip');

    const editWebsiteModal = document.getElementById('editWebsiteModal');
    const editWebsiteClose = document.getElementById('editWebsiteClose');
    const cancelEditWebsite = document.getElementById('cancelEditWebsite');
    const updateWebsiteBtn = document.getElementById('updateWebsite');

    const editWebsiteName = document.getElementById('editWebsiteName');
    const editWebsiteDescription = document.getElementById('editWebsiteDescription');
    const editWebsiteLink = document.getElementById('editWebsiteLink');
    const editWebsiteImage = document.getElementById('editWebsiteImage');
    const editWebsiteWip = document.getElementById('editWebsiteWip');

    let editingWebsiteId = null;

    function isAdmin() {
      return sessionStorage.getItem('isLandingAdmin') === 'true';
    }

    function setAdminUI() {
      if (isAdmin()) {
        adminToggle.classList.add('active');
        adminToggle.textContent = 'Admin (On)';
        addWebsiteButton.style.display = 'inline-block';
        document.querySelectorAll('.admin-only').forEach(el => {
          el.style.display = '';
        });
      } else {
        adminToggle.classList.remove('active');
        adminToggle.textContent = 'Admin';
        addWebsiteButton.style.display = 'none';
        document.querySelectorAll('.admin-only').forEach(el => {
          el.style.display = 'none';
        });
      }
    }

    function openModal(modal) {
      modal.classList.add('active');
    }

    function closeModal(modal) {
      modal.classList.remove('active');
    }

    // Admin button behavior (like wishlist)
    adminToggle.addEventListener('click', () => {
      if (isAdmin()) {
        sessionStorage.removeItem('isLandingAdmin');
        setAdminUI();
      } else {
        openModal(adminLoginModal);
        adminPasswordInput.value = '';
        adminPasswordInput.focus();
      }
    });

    adminLoginClose.addEventListener('click', () => closeModal(adminLoginModal));
    adminLoginCancel.addEventListener('click', () => closeModal(adminLoginModal));

    adminLoginConfirm.addEventListener('click', () => {
      const val = adminPasswordInput.value;
      if (val === ADMIN_PASSWORD) {
        sessionStorage.setItem('isLandingAdmin', 'true');
        setAdminUI();
        closeModal(adminLoginModal);
      } else {
        alert('Incorrect password');
      }
    });

    // Add Website modal
    addWebsiteButton.addEventListener('click', () => {
      if (!isAdmin()) return;
      websiteNameInput.value = '';
      websiteDescriptionInput.value = '';
      websiteLinkInput.value = '';
      websiteImageInput.value = '';
      websiteWipInput.checked = false;
      openModal(addWebsiteModal);
    });

    addWebsiteClose.addEventListener('click', () => closeModal(addWebsiteModal));
    cancelWebsite.addEventListener('click', () => closeModal(addWebsiteModal));

    saveWebsite.addEventListener('click', async () => {
      if (!isAdmin()) return;

      const name = websiteNameInput.value.trim();
      const description = websiteDescriptionInput.value.trim();
      const link = websiteLinkInput.value.trim();
      const image = websiteImageInput.value.trim();
      const wip = websiteWipInput.checked;

      if (!name || !description) {
        alert('Website name and description are required.');
        return;
      }

      const websitesRef = ref(db, 'websites');
      const newRef = push(websitesRef);

      await set(newRef, {
        name,
        description,
        link,
        image,
        wip: !!wip
      });

      closeModal(addWebsiteModal);
    });

    // Edit Website modal logic
    function openEditModal(id, data) {
      editingWebsiteId = id;
      editWebsiteName.value = data.name || '';
      editWebsiteDescription.value = data.description || '';
      editWebsiteLink.value = data.link || '';
      editWebsiteImage.value = data.image || '';
      editWebsiteWip.checked = !!data.wip;

      openModal(editWebsiteModal);
    }

    editWebsiteClose.addEventListener('click', () => closeModal(editWebsiteModal));
    cancelEditWebsite.addEventListener('click', () => closeModal(editWebsiteModal));

    updateWebsiteBtn.addEventListener('click', async () => {
      if (!isAdmin() || !editingWebsiteId) return;

      const name = editWebsiteName.value.trim();
      const description = editWebsiteDescription.value.trim();
      const link = editWebsiteLink.value.trim();
      const image = editWebsiteImage.value.trim();
      const wip = editWebsiteWip.checked;

      if (!name || !description) {
        alert('Website name and description are required.');
        return;
      }

      const websiteRef = ref(db, 'websites/' + editingWebsiteId);

      await update(websiteRef, {
        name,
        description,
        link,
        image,
        wip: !!wip
      });

      closeModal(editWebsiteModal);
      editingWebsiteId = null;
    });

    // Delete website
    async function deleteWebsite(id) {
      if (!isAdmin()) return;
      const confirmed = confirm('Are you sure you want to delete this website?');
      if (!confirmed) return;

      const websiteRef = ref(db, 'websites/' + id);
      await remove(websiteRef);
    }

    // Render websites
    function renderWebsites(data) {
      websitesGrid.innerHTML = '';

      if (!data) return;

      Object.keys(data).forEach(id => {
        const site = data[id];

        const card = document.createElement('div');
        card.className = 'wishlist-item';

        let html = '';

        // Image
        if (site.image && site.image.trim() !== '') {
          const safeImage = site.image.trim();
          html += `<img src="${safeImage}" alt="${site.name || ''}" class="item-image" onerror="this.style.display='none'">`;
        }

        // WIP badge
        if (site.wip) {
          html += `
            <div style="margin-bottom: 8px;">
              <span class="badge-wip">WIP</span>
            </div>
          `;
        }

        // Header
        html += `
          <div class="item-header">
            <h3 class="item-name">${site.name || ''}</h3>
          </div>
        `;

        // Description
        if (site.description) {
          html += `<p class="item-price">${site.description}</p>`;
        }

        // Actions
        html += `<div class="item-actions">`;
        if (site.link) {
          const safeLink = site.link;
          html += `<a href="${safeLink}" target="_blank" rel="noopener noreferrer" class="item-link">Open</a>`;
        }

        if (isAdmin()) {
          html += `
            <button class="item-btn edit-btn" data-id="${id}">Edit</button>
            <button class="item-btn delete-btn" data-id="${id}">Delete</button>
          `;
        }

        html += `</div>`;

        card.innerHTML = html;
        websitesGrid.appendChild(card);
      });

      // Attach edit/delete handlers (only visible when admin)
      if (isAdmin()) {
        websitesGrid.querySelectorAll('.edit-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.getAttribute('data-id');
            const siteData = data[id];
            openEditModal(id, siteData);
          });
        });

        websitesGrid.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.getAttribute('data-id');
            deleteWebsite(id);
          });
        });
      }
    }

    // Firebase listener
    const websitesRef = ref(db, 'websites');
    onValue(websitesRef, snapshot => {
      const data = snapshot.val();
      renderWebsites(data);
    });

    // Initial admin UI
    setAdminUI();
  </script>
</body>
</html>
